services:
  app:
    build: .
    container_name: blog_app
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: blog_laravel
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    volumes:
      - .:/var/www
    networks:
      - blog_network

  nginx:
    image: nginx:alpine
    container_name: blog_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - blog_network

  mysql:
    image: mysql:8.0
    container_name: blog_mysql
    environment:
      MYSQL_DATABASE: blog_laravel
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: laravel
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - blog_network

networks:
  blog_network:

volumes:
  mysql_data:
